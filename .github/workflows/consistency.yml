# GitConsistency - GitHub Actions 工作流
# 自动在 PR 上运行代码健康检查并发布评论

name: 🔍 GitConsistency Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "**.js"
      - "**.ts"
      - "**.go"
      - "**.java"
      - "**.yml"
      - "**.yaml"
      - "**.json"
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "干运行模式（不发布评论）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      project_path:
        description: "分析路径"
        required: false
        default: "."

# 权限配置
permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

# 并发控制：同一 PR 的多个运行会排队
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.x"

jobs:
  # ===========================================================================
  # 代码健康检查
  # ===========================================================================
  code-health:
    name: 🔍 Code Health Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 防止运行时间过长

    steps:
      # -----------------------------------------------------------------------
      # 检出代码
      # -----------------------------------------------------------------------
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史进行变更分析
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # -----------------------------------------------------------------------
      # 检出 base 分支（用于 diff）
      # -----------------------------------------------------------------------
      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=1

      # -----------------------------------------------------------------------
      # 设置 Python
      # -----------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -----------------------------------------------------------------------
      # pip 缓存
      # -----------------------------------------------------------------------
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}-${{ env.PYTHON_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}-
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # Semgrep 规则缓存
      # -----------------------------------------------------------------------
      - name: Cache Semgrep rules
        uses: actions/cache@v4
        with:
          path: ~/.semgrep
          key: ${{ runner.os }}-semgrep-rules-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-semgrep-rules-

      # -----------------------------------------------------------------------
      # 安装 uv
      # -----------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      # -----------------------------------------------------------------------
      # 安装 GitConsistency
      # -----------------------------------------------------------------------
      - name: Install GitConsistency
        run: |
          # 使用 pip 而非 uv，确保 setuptools 正确安装
          pip install setuptools wheel
          pip install -e "."
          # Install optional deps separately
          pip install litellm || true
          pip install semgrep bandit safety pygithub pyjwt || true

      # -----------------------------------------------------------------------
      # 缓存模型和数据
      # -----------------------------------------------------------------------
      - name: Cache models and data
        uses: actions/cache@v4
        with:
          path: |
            .cache/
            ~/.cache/
          key: ${{ runner.os }}-gitconsistency-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-gitconsistency-

      # -----------------------------------------------------------------------
      # 运行 GitConsistency 分析
      # -----------------------------------------------------------------------
      - name: Run GitConsistency Analysis
        id: gitconsistency
        env:
          # GitHub 集成（必需）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONSISTENCY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # LLM 配置（可选，没有则跳过 AI 审查）
          CONSISTENCY_LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          CONSISTENCY_LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'deepseek/deepseek-chat' }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'deepseek/deepseek-chat' }}
          CONSISTENCY_LITELLM_FALLBACK_MODEL: ${{ vars.LITELLM_FALLBACK_MODEL || 'anthropic/claude-3-haiku-20240307' }}

          # GitNexus MCP（可选）
          CONSISTENCY_GITNEXUS_MCP_URL: ${{ secrets.GITNEXUS_MCP_URL }}

          # CI 环境变量
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROJECT_PATH: ${{ github.event.inputs.project_path || '.' }}
        run: |
          # 检测服务可用性并记录
          echo "🔍 服务状态检测:"

          # LLM 状态
          if [ -n "$CONSISTENCY_LITELLM_API_KEY" ]; then
            echo "  ✅ LLM API: 已配置"
            echo "  LLM_STATUS=available" >> $GITHUB_ENV
            SKIP_AI_FLAG=""
          else
            echo "  ⚠️  LLM API: 未配置 (AI 审查将跳过)"
            echo "  LLM_STATUS=unavailable" >> $GITHUB_ENV
            SKIP_AI_FLAG="--skip-ai"
          fi

          # GitNexus 状态
          if [ -n "$CONSISTENCY_GITNEXUS_MCP_URL" ]; then
            echo "  ✅ GitNexus: 已配置"
            echo "  GITNEXUS_STATUS=available" >> $GITHUB_ENV
          else
            echo "  ⚠️  GitNexus: 未配置 (调用链分析将跳过)"
            echo "  GITNEXUS_STATUS=unavailable" >> $GITHUB_ENV
          fi

          echo ""
          echo "🚀 开始代码分析..."

          # 干运行模式
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          else
            DRY_RUN_FLAG=""
          fi

          # PR 模式下使用 ci 命令，否则使用 analyze 命令
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            echo "🤖 启用多 Agent 智能审查（SecurityAgent + LogicAgent + StyleAgent）"
            echo "📁 启用增量扫描模式"
            if [ -n "$DRY_RUN_FLAG" ]; then
              gitconsistency ci \
                --event pull_request \
                --pr "$GITHUB_PR_NUMBER" \
                $SKIP_AI_FLAG \
                --dry-run \
                --use-agents \
                --changed-only \
                --base "$GITHUB_BASE_REF"
            else
              gitconsistency ci \
                --event pull_request \
                --pr "$GITHUB_PR_NUMBER" \
                $SKIP_AI_FLAG \
                --use-agents \
                --changed-only \
                --base "$GITHUB_BASE_REF"
            fi
          else
            # 非 PR 模式：生成三种格式的报告
            echo "📝 生成 Markdown 报告..."
            gitconsistency analyze \
              $SKIP_AI_FLAG \
              --format markdown \
              --output report.md

            echo "📝 生成 SARIF 报告..."
            gitconsistency analyze \
              $SKIP_AI_FLAG \
              --format sarif \
              --output report.sarif.json

            echo "📝 生成 HTML 报告..."
            gitconsistency analyze \
              $SKIP_AI_FLAG \
              --format html \
              --output report.html

            # 创建服务状态信息文件
            echo "📊 生成服务状态报告..."
            cat > service-status.md << EOF
          # GitConsistency 服务状态

          ## 执行信息
          - **时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **提交**: ${{ github.sha }}
          - **仓库**: ${{ github.repository }}

          ## 服务可用性
          | 服务 | 状态 | 说明 |
          |------|------|------|
          | LLM API | ${LLM_STATUS:-unknown} | ${LLM_STATUS:+${LLM_STATUS}} |
          | GitNexus | ${GITNEXUS_STATUS:-unknown} | ${GITNEXUS_STATUS:+${GITNEXUS_STATUS}} |

          ## 报告文件
          - report.md - Markdown 格式报告（人类可读）
          - report.sarif.json - SARIF 2.1.0 格式（供 vibe coding agent 使用）
          - report.html - HTML 格式报告（可在浏览器中查看）
          EOF

            # 打包所有报告
            echo "📦 打包报告..."
            zip -r gitconsistency-reports.zip \
              report.md \
              report.sarif.json \
              report.html \
              service-status.md

            echo ""
            echo "✅ 报告生成完成:"
            ls -lh gitconsistency-reports.zip report.* service-status.md 2>/dev/null || true
          fi

      # -----------------------------------------------------------------------
      # 上传报告（Push 事件上传所有格式）
      # -----------------------------------------------------------------------
      - name: Upload Reports (Push)
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-reports-${{ github.run_id }}
          path: |
            gitconsistency-reports.zip
            report.md
            report.sarif.json
            report.html
            service-status.md
          retention-days: 30
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 上传报告（PR 事件上传缓存数据）
      # -----------------------------------------------------------------------
      - name: Upload Cache (PR)
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-cache-${{ github.run_id }}
          path: |
            .cache/gitconsistency/
            data/
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # 快速检查（ruff + mypy）
  # ===========================================================================
  lint:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}-${{ env.PYTHON_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install dev dependencies
        run: |
          pip install setuptools wheel
          # Install litellm separately to avoid resolution issues
          pip install litellm || true
          pip install -e ".[dev]"
          # Install security scanners separately
          pip install semgrep bandit safety pygithub pyjwt || true

      - name: Ruff check
        run: |
          ruff check consistency/ --select E,W,F --output-format=concise

      - name: Ruff format check
        run: |
          ruff format --check consistency/

      - name: MyPy type check
        timeout-minutes: 5
        run: |
          mypy consistency/ --ignore-missing-imports

  # ===========================================================================
  # 测试
  # ===========================================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/pyproject.toml') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitNexus CLI
        run: |
          npm install -g gitnexus
          gitnexus --version

      - name: Install dependencies
        run: |
          pip install setuptools wheel
          pip install litellm || true
          pip install -e ".[dev]"
          pip install semgrep bandit safety pygithub pyjwt || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --ignore=tests/integration --cov=consistency --cov-report=xml --cov-fail-under=30 || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # 不阻塞构建，仅报告

  # ===========================================================================
  # GitNexus 集成测试
  # ===========================================================================
  gitnexus-test:
    name: 🔗 GitNexus MCP Integration
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-gitnexus-${{ hashFiles('**/pyproject.toml') }}-${{ env.PYTHON_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-gitnexus-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitNexus CLI
        run: |
          npm install -g gitnexus
          gitnexus --version

      - name: Install Python dependencies
        run: |
          pip install setuptools wheel
          pip install -e ".[dev]"
          pip install litellm || true
          pip install semgrep bandit safety pygithub pyjwt || true

      - name: Run GitNexus tests
        run: |
          pytest tests/unit/test_gitnexus_client.py -v

      - name: Test GitNexus integration with real CLI
        run: |
          python -c "
          from consistency.core.gitnexus_client import GitNexusClient
          import asyncio

          # 检查 CLI 是否可用
          available = GitNexusClient.is_available()
          print(f'GitNexus CLI available: {available}')

          if available:
              # 创建客户端并测试分析
              client = GitNexusClient()
              repo_path = '.'

              # 尝试分析当前仓库
              try:
                  result = asyncio.run(client.analyze(repo_path))
                  print(f'Analysis result: {result}')
              except Exception as e:
                  print(f'Analysis error (expected if not a supported repo): {e}')
          "

  # ===========================================================================
  # 构建和发布（仅 main 分支）
  # ===========================================================================
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [code-health, lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Build package
        run: |
          uv venv
          uv pip install build --python .venv/bin/python
          uv run python -m build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-package
          path: dist/
          retention-days: 7

  # ===========================================================================
  # 发布到 PyPI（仅标签推送）
  # ===========================================================================
  publish:
    name: 🚀 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/gitconsistency

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: gitconsistency-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
