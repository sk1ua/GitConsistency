# GitConsistency - GitHub Actions 工作流
# 自动在 PR 上运行代码健康检查并发布评论

name: 🔍 GitConsistency Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "**.js"
      - "**.ts"
      - "**.go"
      - "**.java"
      - "**.yml"
      - "**.yaml"
      - "**.json"
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "干运行模式（不发布评论）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      project_path:
        description: "分析路径"
        required: false
        default: "."

# 权限配置
permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

# 并发控制：同一 PR 的多个运行会排队
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.x"

jobs:
  # ===========================================================================
  # 代码健康检查
  # ===========================================================================
  code-health:
    name: 🔍 Code Health Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 防止运行时间过长
    
    steps:
      # -----------------------------------------------------------------------
      # 检出代码
      # -----------------------------------------------------------------------
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史进行变更分析
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # -----------------------------------------------------------------------
      # 检出 base 分支（用于 diff）
      # -----------------------------------------------------------------------
      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=1

      # -----------------------------------------------------------------------
      # 设置 Python
      # -----------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -----------------------------------------------------------------------
      # 安装 uv
      # -----------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      # -----------------------------------------------------------------------
      # 安装 GitConsistency
      # -----------------------------------------------------------------------
      - name: Install GitConsistency
        run: |
          # 使用 pip 而非 uv，确保 setuptools 正确安装
          pip install setuptools wheel
          pip install -e ".[full]"

      # -----------------------------------------------------------------------
      # 缓存模型和数据
      # -----------------------------------------------------------------------
      - name: Cache models and data
        uses: actions/cache@v4
        with:
          path: |
            .cache/
            ~/.cache/
          key: ${{ runner.os }}-gitconsistency-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-gitconsistency-

      # -----------------------------------------------------------------------
      # 运行 GitConsistency 分析
      # -----------------------------------------------------------------------
      - name: Run GitConsistency Analysis
        id: gitconsistency
        env:
          # GitHub 集成（必需）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # LLM 配置（可选，没有则跳过 AI 审查）
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'deepseek/deepseek-chat' }}
          LITELLM_FALLBACK_MODEL: ${{ vars.LITELLM_FALLBACK_MODEL || 'anthropic/claude-3-haiku-20240307' }}
          
          # GitNexus MCP（可选）
          GITNEXUS_MCP_URL: ${{ secrets.GITNEXUS_MCP_URL }}
          
          # CI 环境变量（用于脚本中使用，避免直接插值）
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DRY_RUN_FLAG: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
          PROJECT_PATH: ${{ github.event.inputs.project_path || '.' }}
          # LITELLM_API_KEY 已由上面设置
        run: |
          # 使用环境变量避免注入风险
          if [ -n "$LITELLM_API_KEY" ]; then
            echo "✅ LLM API Key 已配置，将启用 AI 审查"
            SKIP_AI=""
          else
            echo "⚠️ 未配置 LLM API Key，跳过 AI 审查"
            SKIP_AI="--skip-ai"
          fi
          
          # 使用系统 Python 运行（避免 uv run 隔离环境问题）
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            gitconsistency ci \
              --event pull_request \
              --pr "$GITHUB_PR_NUMBER" \
              $SKIP_AI \
              $DRY_RUN_FLAG
          else
            gitconsistency analyze "$PROJECT_PATH" \
              $SKIP_AI \
              --format markdown \
              --output report.md
          fi

      # -----------------------------------------------------------------------
      # 上传报告
      # -----------------------------------------------------------------------
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-report-${{ github.run_id }}
          path: |
            report.md
            .cache/gitconsistency/
            data/
          retention-days: 7
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 上传 Markdown 摘要
      # -----------------------------------------------------------------------
      - name: Upload Summary
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-summary
          path: report.md
          retention-days: 30

  # ===========================================================================
  # 快速检查（ruff + mypy）
  # ===========================================================================
  lint:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install dev dependencies
        run: |
          pip install setuptools wheel
          pip install -e ".[dev,full]" --no-cache

      - name: Ruff check
        run: |
          # Only check critical errors (E, F, W), ignore style/doc issues
          ruff check consistency/ --select E,W,F

      - name: Ruff format check
        run: |
          ruff format --check consistency/

      - name: MyPy type check
        run: |
          mypy consistency/

  # ===========================================================================
  # 测试
  # ===========================================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          pip install setuptools wheel
          pip install -e ".[dev,full]" --no-cache

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --ignore=tests/integration --cov=consistency --cov-report=xml --cov-fail-under=40

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # 不阻塞构建，仅报告

  # ===========================================================================
  # 构建和发布（仅 main 分支）
  # ===========================================================================
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [code-health, lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Build package
        run: |
          uv venv
          uv pip install build --python .venv/bin/python
          uv run python -m build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: gitconsistency-package
          path: dist/
          retention-days: 7

  # ===========================================================================
  # 发布到 PyPI（仅标签推送）
  # ===========================================================================
  publish:
    name: 🚀 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/gitconsistency
    
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: gitconsistency-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
